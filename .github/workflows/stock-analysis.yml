name: Stock Analysis

on:
  schedule:
    # 每天 14:30 (北京时间) 运行选股
    - cron: '30 6 * * 1-5'
    # 每天 20:00 (北京时间) 运行回测
    - cron: '0 12 * * 0'
  workflow_dispatch:  # 允许手动触发

env:
  PYTHON_VERSION: '3.10'

jobs:
  stock-selection:
    name: Stock Selection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        run: |
          echo "DOUBAO_API_KEY=${{ secrets.DOUBAO_API_KEY }}" >> .env
          echo "TUSHARE_TOKEN=${{ secrets.TUSHARE_TOKEN }}" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "DATA_CACHE_ENABLED=true" >> .env
      
      - name: Run stock selection
        run: |
          python scripts/end_of_day_selector.py
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: stock-selection-results
          path: |
            reports/
            logs/
          retention-days: 7

  backtest:
    name: Strategy Backtest
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        run: |
          echo "DOUBAO_API_KEY=${{ secrets.DOUBAO_API_KEY }}" >> .env
          echo "TUSHARE_TOKEN=${{ secrets.TUSHARE_TOKEN }}" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "DATA_CACHE_ENABLED=true" >> .env
      
      - name: Run backtest
        run: |
          python scripts/strategy_backtest.py
      
      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backtest-results
          path: |
            reports/
            logs/
          retention-days: 7

  daily-review:
    name: Daily Review
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        run: |
          echo "DOUBAO_API_KEY=${{ secrets.DOUBAO_API_KEY }}" >> .env
          echo "TUSHARE_TOKEN=${{ secrets.TUSHARE_TOKEN }}" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "DATA_CACHE_ENABLED=true" >> .env
      
      - name: Run daily review
        run: |
          python scripts/daily_review.py
      
      - name: Upload review results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: daily-review-results
          path: |
            reports/
            logs/
          retention-days: 7
